<!DOCTYPE html>
<html>
<head>
    <title>Qwen TTS Test</title>
</head>
<body>
    <h1>Qwen TTS 测试</h1>
    <button id="testBtn">测试 Qwen TTS</button>
    <div id="status"></div>

    <script>
        const API_KEY = 'sk-df253ffca50840e38fea93e662fc3360';
        const API_ENDPOINT = 'https://dashscope.aliyuncs.com/api/v1/services/audio/tts/synthesize';

        document.getElementById('testBtn').onclick = async () => {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = '正在合成语音...';

            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'qwen3-tts-instruct-flash',
                        input: {
                            text: '你好，这是通义千问的语音合成测试。'
                        },
                        parameters: {
                            format: 'mp3',
                            sample_rate: 22050,
                            volume: 50,
                            speech_rate: 100
                        }
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API error: ${response.status} - ${errorText}`);
                }

                const arrayBuffer = await response.arrayBuffer();
                const blob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
                const audioUrl = URL.createObjectURL(blob);
                
                const audio = new Audio(audioUrl);
                audio.play();
                
                statusDiv.textContent = '播放中...';
                audio.onended = () => {
                    statusDiv.textContent = '播放完成！';
                    URL.revokeObjectURL(audioUrl);
                };
            } catch (error) {
                statusDiv.textContent = `错误: ${error.message}`;
                console.error(error);
            }
        };
    </script>
</body>
</html>
